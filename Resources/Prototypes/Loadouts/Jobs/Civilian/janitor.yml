    requirement:
      !type:RoleTimeRequirement
      role: JobJanitor
      time: 52h # 1 hour per week for 1 year

# Head
- type: loadout
  id: JanitorHead
  equipment:
    head: ClothingHeadHatPurplesoft

# Jumpsuit
- type: loadout
  id: JanitorJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitJanitor

- type: loadout
  id: JanitorJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtJanitor

# Erida start
- type: loadout
  id: MaidsuitBlack
  equipment:
    jumpsuit: ClothingUniformJumpsuitmaidblack

- type: loadout
  id: MaidsuitBlue
  equipment:
    jumpsuit: ClothingUniformJumpsuitmaidblue

- type: loadout
  id: MaidsuitPink
  equipment:
    jumpsuit: ClothingUniformJumpsuitmaidpink
# Erida end

# Gloves
- type: loadout
  id: JanitorRubberGloves
